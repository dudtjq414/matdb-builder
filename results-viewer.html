<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matdb 결과 뷰어</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020617; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }

  h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
  .sub { color: #64748b; font-size: 0.8rem; margin-bottom: 1.5rem; }

  /* 드롭존 */
  .drop-zone {
    border: 2px dashed #334155;
    border-radius: 1rem;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #6366f1; background: #1e1b4b33; }
  .drop-zone p { color: #64748b; font-size: 0.9rem; }
  .drop-zone strong { color: #a5b4fc; }
  #fileInput { display: none; }

  /* 통계 카드 */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .stat-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.875rem 1rem; }
  .stat-card .val { font-size: 1.5rem; font-weight: 700; color: #818cf8; }
  .stat-card .lbl { font-size: 0.7rem; color: #64748b; margin-top: 0.2rem; }

  /* 필터 영역 */
  .filters { background: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 200px; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem 0.75rem; color: #f1f5f9; font-size: 0.85rem; outline: none; }
  .search-box:focus { border-color: #6366f1; }
  .search-box::placeholder { color: #475569; }

  .btn-group { display: flex; gap: 0.375rem; flex-wrap: wrap; }
  .type-btn { padding: 0.375rem 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; background: #1e293b; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .type-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
  .type-btn:hover:not(.active) { border-color: #6366f1; color: #a5b4fc; }

  .sort-select { background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.375rem 0.6rem; color: #94a3b8; font-size: 0.75rem; outline: none; cursor: pointer; }

  .export-btn { margin-left: auto; padding: 0.375rem 0.875rem; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; color: #94a3b8; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .export-btn:hover { border-color: #6366f1; color: #a5b4fc; }

  /* 결과 카운트 */
  .result-count { font-size: 0.75rem; color: #475569; margin-bottom: 0.5rem; }

  /* 테이블 */
  .table-wrap { overflow-x: auto; border: 1px solid #1e293b; border-radius: 0.75rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  thead { background: #0f172a; }
  th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: #64748b; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #a5b4fc; }
  th.sorted { color: #818cf8; }
  td { padding: 0.625rem 1rem; border-top: 1px solid #1e293b; }
  tr:hover td { background: #0f172a55; }

  .val-cell { font-family: 'SF Mono', 'Fira Code', monospace; font-weight: 700; color: #818cf8; font-size: 0.9rem; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 9999px; font-size: 0.7rem; }
  .badge-exptl { background: #052e16; color: #86efac; }
  .badge-md { background: #0c1a2e; color: #93c5fd; }
  .badge-ml { background: #2e1065; color: #d8b4fe; }

  .ref-cell { color: #64748b; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .year-cell { color: #475569; }
  .empty { padding: 3rem; text-align: center; color: #334155; }

  /* 카테고리 breakdown */
  .category-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .cat-chip { padding: 0.2rem 0.6rem; border-radius: 9999px; font-size: 0.7rem; background: #1e293b; border: 1px solid #334155; color: #64748b; cursor: pointer; transition: all 0.15s; }
  .cat-chip:hover, .cat-chip.active { background: #312e81; border-color: #6366f1; color: #a5b4fc; }
</style>
</head>
<body>
<div class="wrap">
  <h1>matdb 결과 뷰어</h1>
  <p class="sub">pipeline-result.json 파일을 아래에 드래그하거나 클릭하여 선택하세요</p>

  <!-- 드롭존 -->
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <p style="font-size:2rem;margin-bottom:0.5rem">📂</p>
    <p><strong>pipeline-result.json</strong> 파일을 여기에 드래그하거나 클릭하여 선택</p>
    <p style="margin-top:0.5rem;font-size:0.75rem">워크플로우 실행 후 생성되는 JSON 파일</p>
    <input type="file" id="fileInput" accept=".json" onchange="loadFile(this)">
  </div>

  <!-- 결과 (처음엔 숨김) -->
  <div id="results" style="display:none">
    <!-- 통계 -->
    <div class="stats" id="statsRow"></div>

    <!-- 카테고리 필터 -->
    <div class="category-chips" id="catChips"></div>

    <!-- 검색 + 필터 -->
    <div class="filters">
      <input class="search-box" id="searchBox" placeholder="재료명, 계열, 출처로 검색..." oninput="render()">
      <div class="btn-group" id="typeGroup">
        <button class="type-btn active" data-type="All" onclick="setType(this)">전체</button>
        <button class="type-btn" data-type="Exptl" onclick="setType(this)">Exptl</button>
        <button class="type-btn" data-type="MD" onclick="setType(this)">MD</button>
        <button class="type-btn" data-type="ML" onclick="setType(this)">ML</button>
      </div>
      <select class="sort-select" id="sortSelect" onchange="render()">
        <option value="value-desc">값 높은 순</option>
        <option value="value-asc">값 낮은 순</option>
        <option value="year-desc">최신 순</option>
        <option value="year-asc">오래된 순</option>
        <option value="name-asc">재료명 순</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">CSV 저장</button>
    </div>

    <p class="result-count" id="resultCount"></p>

    <!-- 테이블 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="toggleSort('materialName')">재료명</th>
            <th onclick="toggleSort('category')">계열</th>
            <th onclick="toggleSort('value')">값</th>
            <th>유형</th>
            <th onclick="toggleSort('reference')">출처</th>
            <th onclick="toggleSort('year')">연도</th>
            <th>비고</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <p class="empty" id="emptyMsg" style="display:none">검색 결과가 없습니다</p>
    </div>
  </div>
</div>

<script>
let allData = [];
let unit = '';
let activeType = 'All';
let activeCategory = '';

// 파일 로드
function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const json = JSON.parse(e.target.result);
      initData(json);
    } catch (err) {
      alert('JSON 파싱 오류: ' + err.message);
    }
  };
  reader.readAsText(file, 'utf-8');
}

function initData(json) {
  allData = json.entries || [];
  unit = json.unit || '';
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('results').style.display = 'block';

  // 통계
  const byType = {};
  const byCat = {};
  allData.forEach(e => {
    byType[e.dataType] = (byType[e.dataType] || 0) + 1;
    byCat[e.category] = (byCat[e.category] || 0) + 1;
  });
  const vals = allData.map(e => e.value).filter(v => v != null);
  const maxV = vals.length ? Math.max(...vals).toFixed(2) : '-';
  const avgV = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : '-';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${allData.length}</div><div class="lbl">총 데이터</div></div>
    <div class="stat-card"><div class="val">${Object.keys(byCat).length}</div><div class="lbl">계열 수</div></div>
    <div class="stat-card"><div class="val">${maxV}</div><div class="lbl">최고값 (${unit})</div></div>
    <div class="stat-card"><div class="val">${avgV}</div><div class="lbl">평균값 (${unit})</div></div>
    <div class="stat-card"><div class="val">${byType.Exptl||0}</div><div class="lbl">실험 (Exptl)</div></div>
    <div class="stat-card"><div class="val">${byType.MD||0}</div><div class="lbl">시뮬레이션 (MD)</div></div>
  `;

  // 카테고리 칩
  const cats = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  document.getElementById('catChips').innerHTML =
    `<button class="cat-chip active" data-cat="" onclick="setCat(this)">전체</button>` +
    cats.map(([c,n]) => `<button class="cat-chip" data-cat="${c}" onclick="setCat(this)">${c} <span style="color:#475569">${n}</span></button>`).join('');

  render();
}

function setType(btn) {
  activeType = btn.dataset.type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b === btn));
  render();
}

function setCat(btn) {
  activeCategory = btn.dataset.cat;
  document.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b === btn));
  render();
}

function toggleSort(field) {
  const sel = document.getElementById('sortSelect');
  if (sel.value === field + '-asc') sel.value = field + '-desc';
  else sel.value = field + '-asc';
  render();
}

function render() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const [sortField, sortDir] = sort.split('-');

  let rows = allData.filter(e => {
    if (activeType !== 'All' && e.dataType !== activeType) return false;
    if (activeCategory && e.category !== activeCategory) return false;
    if (q && !`${e.materialName} ${e.category} ${e.reference}`.toLowerCase().includes(q)) return false;
    return true;
  });

  rows.sort((a, b) => {
    let av = a[sortField], bv = b[sortField];
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('resultCount').textContent = `${rows.length}건 표시 / 전체 ${allData.length}건`;

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('emptyMsg').style.display = 'block';
  } else {
    document.getElementById('emptyMsg').style.display = 'none';
    tbody.innerHTML = rows.map(e => `
      <tr>
        <td>${e.materialName || ''}</td>
        <td style="color:#94a3b8">${e.category || ''}</td>
        <td class="val-cell">${e.value} <span style="font-size:0.7rem;color:#475569;font-weight:400">${unit}</span></td>
        <td><span class="badge badge-${(e.dataType||'').toLowerCase()}">${e.dataType||'-'}</span></td>
        <td class="ref-cell" title="${e.reference||''}">${e.reference||''}</td>
        <td class="year-cell">${e.year||''}</td>
        <td style="color:#475569;font-size:0.75rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${e.notes||''}">${e.notes||''}</td>
      </tr>
    `).join('');
  }
}

function exportCSV() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const [sortField, sortDir] = sort.split('-');
  let rows = allData.filter(e => {
    if (activeType !== 'All' && e.dataType !== activeType) return false;
    if (activeCategory && e.category !== activeCategory) return false;
    if (q && !`${e.materialName} ${e.category} ${e.reference}`.toLowerCase().includes(q)) return false;
    return true;
  });
  const header = `Material Name,Category,Value,Unit,Data Type,Reference,Year,Notes`;
  const body = rows.map(e =>
    [e.materialName,e.category,e.value,unit,e.dataType,e.reference,e.year,e.notes]
      .map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')
  ).join('\n');
  const blob = new Blob(['﻿'+header+'\n'+body], {type:'text/csv;charset=utf-8'});
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'matdb-results.csv'});
  a.click();
}

// 드래그앤드롭
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { initData(JSON.parse(ev.target.result)); }
    catch(err) { alert('JSON 파싱 오류: ' + err.message); }
  };
  reader.readAsText(file, 'utf-8');
});
</script>
</body>
</html>
